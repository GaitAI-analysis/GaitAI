<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" rx="42" fill="#ffffff"/><text x="70" y="88" fill="#0f172a" font-family="Arial" font-size="42" font-weight="900">Gait Cycle & Clinical Parameters</text><text x="70" y="128" fill="#475569" font-family="Arial" font-size="22">Medical gait analytics converts walking cycles into interpretable features for fall-risk and rehabilitation monitoring.</text>
